substitutions:
  # Set the MAC addresses and encryption keys of your Victron devices here
  # The values here are examples and cannot work for your devices
  smart_shunt_mac_address: cb:8a:4f:19:e7:83
  smart_shunt_encryption_key: 1432dc30073bcee92f95709d9d200205


external_components:
  - source: github://Fabian-Schmidt/esphome-victron_ble
  - source: github://hsteinhaus/esphome-m5stack-pps-module@master
    refresh: 0s
  - source: github://hsteinhaus/esphome-gppid@master
    refresh: 0s

esphome:
  name: alternator-regulator
  friendly_name: "Alternator regulator based on M5Stack and ESPHome"
  platformio_options:
    upload_speed: 2000000
    board_build.f_cpu: 240000000L
    board_build.f_flash: 80000000L
    board_build.arduino.memory_type: qio_qspi
    build_flags:
     -DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768
  project:
    name: "hsteinhaus.alternator_regulator"
    version: "0.1"
  on_boot:
    then:
      # - lambda:
      #     App.set_loop_interval(0);
      - sensor.template.publish:
          id: v_bat
          state: 27.0
      - sensor.template.publish:
          id: i_bat
          state: 0.0
      - sensor.template.publish:
          id: soc
          state: 78.5


esp32:
  board: m5stack-core-esp32
  flash_size: 8MB
  # framework:
  #   type: arduino
  framework:
    type: esp-idf
    version: latest
    sdkconfig_options:
      # ESP32
      CONFIG_ESP32_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ: "240"
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "12000"
debug:
  update_interval: 5s

# Enable logging
logger:
  level: DEBUG

web_server:
  port: 80
#  ota: true
  local: true
  version: 3

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  reboot_timeout: 0s
  domain: .wifi.home
  networks:
    - ssid: !secret wifi_ssid_02
      password: !secret wifi_password_02

