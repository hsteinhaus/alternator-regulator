packages:
  device_base: !include packages/device_base.yaml
  # core_basic_27: !include packages/core_basic_27.yaml
  core2_11: !include packages/core2_11.yaml
  # core_s3: !include packages/core_s3.yaml
  # lvgl_gui: !include packages/lvgl_gui.yaml
  pid: !include packages/pid.yaml
  pps: !include packages/pps.yaml
  bt: !include packages/bluetooth.yaml

esphome:
  name: alternator-regulator
  friendly_name: "Alternator regulator based on M5Stack and ESPHome"
  project:
    name: "hsteinhaus.alternator_regulator"
    version: "0.1"
  on_boot:
    then:
      # - lambda:
      #     App.set_loop_interval(0);


debug:
  update_interval: 5s

# Enable logging
logger:
  level: INFO

web_server:
  port: 80
#  ota: true
  local: true
  version: 3
  sorting_groups:
    - id: voltage_pid_group
      name: "Voltage PID settings"
      sorting_weight: -100
    - id: pps_group
      name: "Power Supply Module"
      sorting_weight: -10
    - id: alt_data
      name: "Alternator state"
      sorting_weight: -30
    - id: bat_data
      name: "Battery state"
      sorting_weight: -20
# Enable Home Assistant API
api:
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  reboot_timeout: 0s
  domain: .wifi.home
  networks:
    - ssid: !secret wifi_ssid_02
      password: !secret wifi_password_02


#############################################################################

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    loop_time:
      name: "Loop Time"

  # - platform: dallas_temp
  #   id: t_diodes
  #   name: Diode temp
  #   web_server:
  #     sorting_group_id: alt_data
  #   address: 0xd30723c061986428
  #   update_interval: 10s
  # - platform: dallas_temp
  #   id: t_case
  #   name: Case temp
  #   web_server:
  #     sorting_group_id: alt_data
  #   address: 0xce0b244223798b28
  #   update_interval: 10s

  - platform: pulse_counter
    pin: ${rpm_io}
    name: "RPM"
    id: rpm
    unit_of_measurement: rpm  # counter is already in pulses per minute
    accuracy_decimals: 0
    web_server:
      sorting_group_id: alt_data
    use_pcnt: True
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    update_interval: .5s
    filters:
    - multiply: 0.25
    - or:
      - throttle: 5s
      - delta: 1%
    # on_value:
    #   then:
    #     - lvgl.label.update:
    #         id: rpm_label
    #         text:
    #           format: "Alternator rpm: %.0f"
    #           args: x


  - platform: adc
    pin: ${vbat_io}
    id: v_alt
    name: "Alternator voltage"
    web_server:
      sorting_group_id: alt_data
    attenuation: 6dB
    samples: 16
    update_interval: 25ms
    filters:
      - multiply: 22.78  # voltage divider 1k/22k
      - sliding_window_moving_average:
         send_every: 4
         window_size: 8

##############################################################################

font:
  - file: "gfonts://Roboto+Mono@medium"
    id: font_roboto_medium22
    size: 20
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/³µ'

color:
  - id: RED
    red: 100%
    green: 0%
    blue: 0%
  - id: BLUE
    red: 0%
    green: 0%
    blue: 100%
  - id: WHITE
    red: 100%
    green: 100%
    blue: 100%
  - id: BLACK
    red: 0%
    green: 0%
    blue: 0%

