packages:
  device_base: !include packages/device_base.yaml
  core_basic_27: !include packages/core_basic_27.yaml
  # lvgl_gui: !include packages/lvgl_gui.yaml
  #lambda_gui: !include packages/lambda_gui.yaml
  pid: !include packages/pid.yaml
  pps: !include packages/pps.yaml
  rpm: !include packages/rpm.yaml

esphome:
  name: alternator-regulator
  friendly_name: "Alternator regulator based on M5Stack and ESPHome"
  project:
    name: "hsteinhaus.alternator_regulator"
    version: "0.1"
  on_boot:
    then:
      # - lambda:
      #     App.set_loop_interval(0);
      - sensor.template.publish:
          id: v_bat
          state: 27.0
      - sensor.template.publish:
          id: i_bat
          state: 0.0
      - sensor.template.publish:
          id: soc
          state: 78.5

debug:
  update_interval: 5s

# Enable logging
logger:
  level: INFO

web_server:
  port: 80
#  ota: true
  local: true
  version: 3

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_password

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  reboot_timeout: 0s
  domain: .wifi.home
  networks:
    - ssid: !secret wifi_ssid_02
      password: !secret wifi_password_02



#############################################################################

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    loop_time:
      name: "Loop Time"
  - platform: template
    name: "Battery voltage"
    id: v_bat
  - platform: template
    name: "Battery current"
    id: i_bat
  - platform: template
    name: "Battery SoC"
    id: soc

  - platform: dallas_temp
    address: 0xd30723c061986428
    id: t_diodes
    name: Diode temp
    update_interval: 10s
  - platform: dallas_temp
    address: 0xce0b244223798b28
    id: t_case
    update_interval: 10s
    name: Case temp

  - platform: pulse_counter
    pin: GPIO5
    name: "RPM"
    id: rpm
    unit_of_measurement: rpm  # counter is already in pulses per minute
    accuracy_decimals: 0
    use_pcnt: True
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    update_interval: .5s
    filters:
    - multiply: 0.25
    - or:
      - throttle: 5s
      - delta: 1%
    # on_value:
    #   then:
    #     - lvgl.label.update:
    #         id: rpm_label
    #         text:
    #           format: "Alternator rpm: %.0f"
    #           args: x


  - platform: adc
    pin: GPIO35
    id: v_alt
    name: "Alternator voltage"
    attenuation: 6dB
    samples: 16
    update_interval: 25ms
    filters:
      - multiply: 22.78  # voltage divider 1k/22k
      - sliding_window_moving_average:
         send_every: 4
         window_size: 8

##############################################################################

font:
  - file: "gfonts://Roboto+Mono@medium"
    id: font_roboto_medium22
    size: 20
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/³µ'

color:
  - id: RED
    red: 100%
    green: 0%
    blue: 0%
  - id: BLUE
    red: 0%
    green: 0%
    blue: 100%
  - id: WHITE
    red: 100%
    green: 100%
    blue: 100%
  - id: BLACK
    red: 0%
    green: 0%
    blue: 0%

display:
  - platform: ili9xxx
    model: M5Stack
    id: m5stack_display
    invert_colors: true
    color_palette: 8BIT
    pixel_mode: 16bit
    cs_pin: 14
    dc_pin: 27
    reset_pin: 33
    rotation: 0
    show_test_card: false
    data_rate: 40MHz
    update_interval: 0.1s
    auto_clear_enabled: false
    lambda: !include { file: packages/lambda_gui.yaml }

