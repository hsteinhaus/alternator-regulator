##############################################################################

spi:
  clk_pin: 18
  mosi_pin: 23
#  miso_pin: 19
  interface: spi3

i2c:
  id: bus_a
  frequency: 400kHz
  scan: False
  sda: GPIO21
  scl: GPIO22

one_wire:
  - platform: gpio
    pin: GPIO19

# GPIO pin of the display backlight
output:
  - platform: ledc
    pin: 32
    id: gpio_32_backlight_pwm

  - platform: template
    id: i_field_out
    type: float
    write_action:
      - number.set:
          id: set_current
          value: !lambda return state;
#############################################################################

m5stack_pps:
  i2c_id: bus_a
  id: pps1

sensor:
  - platform: debug
    free:
      name: "Heap Free"
    loop_time:
      name: "Loop Time"
  - platform: template
    name: "Battery voltage"
    id: v_bat
  - platform: template
    name: "Battery current"
    id: i_bat
  - platform: template
    name: "Battery SoC"
    id: soc

  - platform: dallas_temp
    address: 0xd30723c061986428
    id: t_diodes
    name: Diode temp
    update_interval: 10s
  - platform: dallas_temp
    address: 0xce0b244223798b28
    id: t_case
    update_interval: 10s
    name: Case temp

  - platform: pulse_counter
    pin: GPIO5
    name: "RPM"
    id: rpm
    unit_of_measurement: rpm  # counter is already in pulses per minute
    accuracy_decimals: 0
    use_pcnt: True
    count_mode:
      rising_edge: DISABLE
      falling_edge: INCREMENT
    update_interval: .5s
    filters:
    - multiply: 0.25
    - or:
      - throttle: 5s
      - delta: 1%
    # on_value:
    #   then:
    #     - lvgl.label.update:
    #         id: rpm_label
    #         text:
    #           format: "Alternator rpm: %.0f"
    #           args: x

  - platform: m5stack_pps
    m5stack_pps: pps1
    mode:
      id: current_mode
      name: "Output mode"
    voltage:
      id: actual_voltage
      name: "PPS Field voltage"
    current:
      id: actual_current
      name: "PPS Field current"
    power:
      id: actual_power
      name: "PPS Field power"

  - platform: adc
    pin: GPIO35
    id: v_alt
    name: "Alternator voltage"
    attenuation: 6dB
    samples: 16
    update_interval: 25ms
    filters:
      - multiply: 22.78  # voltage divider 1k/22k
      - sliding_window_moving_average:
         send_every: 4
         window_size: 8

  - platform: pid
    pid_id: field_pid
    name: "Field current output"
    unit_of_measurement: A
    accuracy_decimals: 3
    type: RESULT

number:
  - platform: m5stack_pps
    voltage:
      name: "Voltage"
      id: set_voltage
    current:
      name: "Current"
      id: set_current
  - platform: template
    id: v_target_num
    name: "Target voltage"
    unit_of_measurement: V
    step: 0.1
    min_value: 0
    max_value: 20
    optimistic: True

switch:
  - platform: m5stack_pps
    output_enable:
      name: "Output enable"
      id: oe_switch
      # web_server:
      #   sorting_weight: 90
##############################################################################

pid:
  - id: field_pid
    current_value: v_alt
    target_number: v_target_num
    # target_sensor: v_target_sensor
    output:
      id: i_field_out
      min: 0.01
      max: 0.5
    control_parameters:
      kp: 0.5
      ki: 0.05
      kd: 0.1
      # output_averaging_samples: 5      # smooth the output over 5 samples
      # derivative_averaging_samples: 5  # smooth the derivative value over 10 samples
    # deadband_parameters:
    #   threshold_high: 0.01
    #   threshold_low: -0.01

##############################################################################
font:
  - file: "gfonts://Roboto+Mono@medium"
    id: font_roboto_medium22
    size: 20
    glyphs: '!"%()+,-_.:°0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz/³µ'

color:
  - id: RED
    red: 100%
    green: 0%
    blue: 0%
  - id: BLUE
    red: 0%
    green: 0%
    blue: 100%
  - id: WHITE
    red: 100%
    green: 100%
    blue: 100%
  - id: BLACK
    red: 0%
    green: 0%
    blue: 0%

light:
  - platform: monochromatic
    output: gpio_32_backlight_pwm
    name: "Display Backlight"
    id: back_light
    restore_mode: ALWAYS_ON

