external_components:
  - source: github://hsteinhaus/esphome-m5stack-pps-module@master
    refresh: 0s

m5stack_pps:
  i2c_id: bus_a
  id: pps1

sensor:
  - platform: m5stack_pps
    m5stack_pps: pps1
    mode:
      id: current_mode
      name: "Output mode"
      web_server:
        sorting_group_id: pps_group
    voltage:
      id: actual_voltage
      name: "PPS Field voltage"
      web_server:
        sorting_group_id: pps_group
    current:
      id: actual_current
      name: "PPS Field current"
      web_server:
        sorting_group_id: pps_group
    power:
      id: actual_power
      name: "PPS Field power"
      web_server:
        sorting_group_id: pps_group

number:
  - platform: m5stack_pps
    m5stack_pps: pps1
    channel: voltage
    name: "Voltage"
    id: set_voltage
    web_server:
      sorting_group_id: pps_group
  - platform: m5stack_pps
    m5stack_pps: pps1
    channel: current
    name: "Current"
    id: set_current
    web_server:
      sorting_group_id: pps_group

switch:
  - platform: m5stack_pps
    m5stack_pps: pps1
    name: "Output enable"
    id: oe_switch
    web_server:
      sorting_group_id: pps_group
